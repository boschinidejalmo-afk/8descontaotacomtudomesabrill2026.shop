<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Feirão</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#052e16,#065f46,#022c22);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#fff;
}

/* CONTAINER */

.container{
width:100%;
max-width:420px;
padding:20px;
}

/* CARD */

.card{
background:#ffffff;
color:#022c22;
border-radius:24px;
padding:30px;
box-shadow:0 25px 80px rgba(0,0,0,0.6);
text-align:center;
}

/* BADGE */

.badge{
background:#16a34a;
color:white;
padding:8px 18px;
border-radius:50px;
font-size:12px;
font-weight:700;
display:inline-block;
margin-bottom:15px;
}

/* TITULO */

.title{
font-size:34px;
font-weight:800;
margin-bottom:10px;
}

/* SUB */

.subtitle{
font-size:14px;
color:#065f46;
margin-bottom:20px;
}

/* PREÇO */

.price-box{
background:#ecfdf5;
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.old{
text-decoration:line-through;
color:#6b7280;
font-size:14px;
}

.new{
font-size:48px;
font-weight:800;
color:#16a34a;
margin-top:5px;
}

/* LISTA */

.list{
text-align:left;
margin-bottom:20px;
}

.list div{
margin-bottom:8px;
font-size:14px;
}

/* BOTÃO */

.cta{
display:block;
padding:18px;
border-radius:14px;
font-size:18px;
font-weight:800;
text-decoration:none;
color:white;
background:linear-gradient(90deg,#16a34a,#22c55e);
box-shadow:0 10px 40px rgba(34,197,94,0.6);
transition:0.3s;
}

.cta:hover{
transform:scale(1.05);
}

/* ALERTA */

.timer{
margin-top:15px;
font-size:13px;
color:#dc2626;
font-weight:bold;
}

/* FOOTER */

.footer{
margin-top:15px;
font-size:12px;
color:#065f46;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="badge">🔥 OFERTA DISPONÍVEL</div>

<div class="title">MEGA FEIRÃO</div>

<div class="subtitle">
Aproveite agora antes que acabe
</div>

<div class="price-box">
<div class="old">De R$ 7.865,00</div>
<div class="new">R$ 79,97</div>
</div>

<div class="list">
<div>✔ Liberação imediata</div>
<div>✔ Desconto exclusivo</div>
<div>✔ Compra 100% segura</div>
</div>

<a class="cta" href="https://mielnickichaskey-a11y.github.io/promocoesqueimatudomesabril2026/inicio/">
GARANTIR AGORA →
</a>

<div class="timer">
⚠ Oferta por tempo limitado
</div>

<div class="footer">
🔒 Ambiente seguro • Pagamento protegido
</div>

</div>

</div>

</body>
</html>
